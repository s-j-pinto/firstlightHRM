
name: Missing Documents Reminder Job

on:
  schedule:
    # Runs at 3:00 PM UTC (which is 8:00 AM Pacific Standard Time)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  remind_missing_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder webhook
        run: |
          curl --request GET \
          --url https://care-connect-360--firstlighthomecare-hrm.us-central1.hosted.app/api/cron/missing-docs-reminder \
          --header 'Authorization: Bearer ${{ secrets.CRON_SECRET }}' \
          --fail
