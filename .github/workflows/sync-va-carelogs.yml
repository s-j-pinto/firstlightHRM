name: Daily VA CareLog Sync

on:
  schedule:
    # Runs at 10:00 PM UTC only on Sunday.
    - cron: '0 22 * * 0'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  sync_va_carelogs:
    runs-on: ubuntu-latest
    steps:
      - name: Sync VA Teletrack CareLogs
        run: |
          curl --request GET \
          --url https://care-connect-360--firstlighthomecare-hrm.us-central1.hosted.app/api/cron/sync-va-carelogs \
          --header 'Authorization: Bearer ${{ secrets.CRON_SECRET }}' \
          --fail
